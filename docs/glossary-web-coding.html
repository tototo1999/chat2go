<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Coding 名词表 · 中英对照</title>
<style>
:root {
  --accent: #1D9E75;
  --accent-soft: #1D9E7515;
  --bg: #fafaf7;
  --surface: #ffffff;
  --text: #1a1a1a;
  --text-dim: #666;
  --border: #e5e5e0;
  --code-bg: #f4f4ef;
  --shadow: 0 1px 3px rgba(0,0,0,0.04);
}
[data-theme="dark"] {
  --accent: #2dd4a7;
  --accent-soft: #2dd4a720;
  --bg: #0e0f0d;
  --surface: #181a17;
  --text: #e8e8e3;
  --text-dim: #999;
  --border: #2a2c28;
  --code-bg: #232520;
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; scroll-padding-top: 130px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
header {
  position: sticky; top: 0; z-index: 10;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
}
.header-inner {
  max-width: 980px; margin: 0 auto;
  display: flex; flex-direction: column; gap: 10px;
}
.title-row {
  display: flex; justify-content: space-between; align-items: center; gap: 12px;
}
h1 {
  font-size: 16px; font-weight: 600;
  color: var(--text);
}
h1 .accent { color: var(--accent); }
.theme-toggle {
  background: none; border: 1px solid var(--border);
  color: var(--text); padding: 6px 10px;
  border-radius: 6px; cursor: pointer;
  font-size: 13px; font-family: inherit;
}
.theme-toggle:hover { background: var(--accent-soft); border-color: var(--accent); }
.search {
  width: 100%; padding: 10px 14px;
  font-size: 15px; font-family: inherit;
  background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 8px;
  outline: none;
}
.search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
nav.cats {
  display: flex; flex-wrap: wrap; gap: 6px;
}
nav.cats a {
  font-size: 12px; padding: 4px 10px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 999px; color: var(--text-dim);
  text-decoration: none; white-space: nowrap;
}
nav.cats a:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
main {
  max-width: 980px; margin: 0 auto;
  padding: 24px 16px 80px;
}
section {
  margin-bottom: 36px;
}
section h2 {
  font-size: 18px; font-weight: 600;
  padding-bottom: 8px; margin-bottom: 14px;
  border-bottom: 2px solid var(--accent);
  color: var(--accent);
  display: flex; justify-content: space-between; align-items: baseline;
}
section h2 .count {
  font-size: 12px; color: var(--text-dim); font-weight: 400;
}
.terms {
  display: grid; gap: 10px;
  grid-template-columns: 1fr;
}
@media (min-width: 720px) {
  .terms { grid-template-columns: 1fr 1fr; }
}
.term {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  box-shadow: var(--shadow);
  transition: border-color 0.15s, opacity 0.15s;
  position: relative;
}
.term:hover { border-color: var(--accent); }
.term .head {
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap; margin-bottom: 4px;
}
.term .en {
  font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  font-size: 14px; font-weight: 600;
  color: var(--accent);
  background: var(--code-bg);
  padding: 2px 7px; border-radius: 4px;
}
.term .zh {
  font-size: 14px; font-weight: 500;
  color: var(--text);
}
.term .phonetic {
  font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  font-size: 12px; color: var(--text-dim);
  font-style: italic;
}
.term .hint {
  font-size: 12px; color: var(--text-dim);
  line-height: 1.5;
}
.term .note {
  font-size: 12px; color: var(--text);
  line-height: 1.5;
  background: var(--accent-soft);
  border-left: 2px solid var(--accent);
  padding: 6px 8px; border-radius: 0 4px 4px 0;
  margin-top: 6px;
  white-space: pre-wrap;
}
.term.is-edited::after {
  content: '✎'; position: absolute; top: -6px; right: -6px;
  background: var(--accent); color: #fff;
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
}
.term.is-favorite.is-edited::before { left: -6px; }
.term.is-favorite.is-edited::after { right: -6px; }
.edit-form {
  display: flex; flex-direction: column; gap: 8px;
}
.edit-row {
  display: flex; flex-direction: column; gap: 3px;
}
.edit-row label {
  font-size: 11px; color: var(--text-dim);
  font-weight: 500; letter-spacing: 0.3px;
}
.edit-row input, .edit-row textarea {
  width: 100%; padding: 6px 8px;
  font-size: 13px; font-family: inherit;
  background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 5px;
  outline: none; resize: vertical;
}
.edit-row input:focus, .edit-row textarea:focus {
  border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft);
}
.edit-row input[readonly] {
  background: var(--code-bg); color: var(--text-dim);
  cursor: not-allowed;
}
.edit-actions {
  display: flex; gap: 6px; margin-top: 4px;
}
.edit-actions button {
  padding: 6px 12px; font-size: 12px; font-family: inherit;
  border: 1px solid var(--border); border-radius: 5px;
  background: var(--surface); color: var(--text);
  cursor: pointer;
}
.edit-actions button[data-action="save"] {
  background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600;
}
.edit-actions button[data-action="reset"] {
  margin-left: auto; color: #ef4444; border-color: transparent;
}
.edit-actions button:hover { opacity: 0.85; }
.term .actions {
  margin-left: auto;
  display: flex; gap: 2px;
  flex-shrink: 0;
}
.term .actions button {
  background: none; border: none; cursor: pointer;
  padding: 4px 6px; font-size: 14px;
  color: var(--text-dim); opacity: 0.45;
  transition: opacity 0.15s, color 0.15s, background 0.15s;
  border-radius: 4px;
  line-height: 1; font-family: inherit;
  min-width: 28px; min-height: 28px;
}
.term:hover .actions button,
.term .actions button:hover,
.term .actions button:focus,
.term.is-favorite .actions .fav { opacity: 1; }
.term .actions button:hover { background: var(--code-bg); }
.term .actions .fav.is-on { color: #f59e0b; }
.term .actions .del:hover { color: #ef4444; }
.term .actions .del.is-undo { color: var(--accent); opacity: 1; }
.term .actions .speak:hover { color: var(--accent); }
.term .actions .speak.is-playing {
  color: var(--accent); opacity: 1;
  animation: pulse 0.8s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}
.term.is-favorite { border-color: #f59e0b66; }
.term.is-favorite::before {
  content: '★'; position: absolute; top: -6px; left: -6px;
  background: #f59e0b; color: #fff;
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
}
.term.hidden-search { display: none; }
.term.is-deleted { display: none; }
body.show-deleted .term.is-deleted:not(.hidden-search) {
  display: block; opacity: 0.5; background: var(--bg);
}
body.show-deleted .term.is-deleted::after {
  content: '已删除'; position: absolute; top: 8px; right: 60px;
  font-size: 10px; color: var(--text-dim);
  background: var(--border); padding: 2px 6px; border-radius: 3px;
}
section.empty { display: none; }
section#favorites { display: none; }
section#favorites.show { display: block; }
section#favorites h2 { color: #d97706; border-bottom-color: #f59e0b; }
.deleted-toggle {
  display: none;
  background: none; border: 1px dashed var(--border);
  color: var(--text-dim); padding: 4px 10px;
  border-radius: 6px; cursor: pointer;
  font-size: 12px; font-family: inherit;
}
.deleted-toggle.show { display: inline-block; }
.deleted-toggle.is-on { background: var(--accent-soft); border-style: solid; border-color: var(--accent); color: var(--accent); }
.no-results {
  text-align: center; padding: 40px 20px;
  color: var(--text-dim); font-size: 14px;
  display: none;
}
.no-results.show { display: block; }
footer {
  text-align: center; padding: 24px 16px;
  color: var(--text-dim); font-size: 12px;
  border-top: 1px solid var(--border);
}
@media print {
  header { position: static; }
  .search, nav.cats, .theme-toggle, .deleted-toggle, .term .actions { display: none; }
  .term { break-inside: avoid; box-shadow: none; }
  .term.is-deleted { display: none !important; }
  section { break-inside: avoid-page; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="title-row">
      <h1>Web Coding <span class="accent">名词表</span> · 中英对照</h1>
      <div style="display:flex;gap:6px;">
        <button class="deleted-toggle" id="delToggle">回收站 0</button>
        <button class="theme-toggle" id="themeBtn">🌙 暗色</button>
      </div>
    </div>
    <input type="text" class="search" id="search" placeholder="搜索英文 / 中文 / 释义…">
    <nav class="cats" id="catsNav"></nav>
  </div>
</header>

<main id="main">
  <section id="favorites">
    <h2><span>⭐ 我的收藏</span><span class="count" id="favCount">0 个</span></h2>
    <div class="terms" id="favoritesGrid"></div>
  </section>
  <div class="no-results" id="noResults">没有匹配的术语</div>
</main>

<footer>
  共 <span id="totalCount">0</span> 个术语 · 单文件离线可用 · 双击 HTML 直接打开
</footer>

const state = {
  favorites: new Set(JSON.parse(localStorage.getItem('glossary-favorites') || '[]')),
  deleted: new Set(JSON.parse(localStorage.getItem('glossary-deleted') || '[]')),
  edits: JSON.parse(localStorage.getItem('glossary-edits') || '{}'),
  showDeleted: localStorage.getItem('glossary-show-deleted') === '1',
  query: ''
};

function save() {
  localStorage.setItem('glossary-favorites', JSON.stringify([...state.favorites]));
  localStorage.setItem('glossary-deleted', JSON.stringify([...state.deleted]));
  localStorage.setItem('glossary-edits', JSON.stringify(state.edits));
  localStorage.setItem('glossary-show-deleted', state.showDeleted ? '1' : '0');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function getTermData(catId, en) {
  const cat = DATA.find(c => c.id === catId);
  if (!cat) return null;
  const orig = cat.terms.find(t => t[0] === en);
  if (!orig) return null;
  const edit = state.edits[catId + '::' + en] || {};
  return {
    en: orig[0],
    zh: edit.zh !== undefined ? edit.zh : orig[1],
    hint: edit.hint !== undefined ? edit.hint : (orig[2] || ''),
    phonetic: edit.phonetic || '',
    note: edit.note || '',
    edited: Object.keys(edit).length > 0
  };
}

function searchKey(d) {
  return [d.en, d.zh, d.hint, d.phonetic, d.note].join(' ').toLowerCase();
}

function renderCardContent(card) {
  const id = card.dataset.id;
  const [catId, en] = id.split('::');
  const d = getTermData(catId, en);
  if (!d) return;
  card.dataset.search = searchKey(d);
  applyState(card);
  card.classList.remove('is-editing');
  card.classList.toggle('is-edited', d.edited);
  const isFav = state.favorites.has(id);
  const isDel = state.deleted.has(id);
  card.innerHTML =
    '<div class="head">' +
      '<code class="en">' + escapeHtml(d.en) + '</code>' +
      (d.phonetic ? '<span class="phonetic">' + escapeHtml(d.phonetic) + '</span>' : '') +
      '<span class="zh">' + escapeHtml(d.zh) + '</span>' +
      '<div class="actions">' +
        '<button class="speak" data-action="speak" title="朗读" aria-label="朗读">🔊</button>' +
        '<button class="fav' + (isFav ? ' is-on' : '') + '" data-action="fav" title="' + (isFav ? '取消收藏' : '收藏置顶') + '" aria-label="收藏">★</button>' +
        '<button class="edit" data-action="edit" title="编辑/加音标笔记" aria-label="编辑">✎</button>' +
        '<button class="del' + (isDel ? ' is-undo' : '') + '" data-action="del" title="' + (isDel ? '恢复' : '删除') + '" aria-label="删除">' + (isDel ? '↺' : '✕') + '</button>' +
      '</div>' +
    '</div>' +
    (d.hint ? '<div class="hint">' + escapeHtml(d.hint) + '</div>' : '') +
    (d.note ? '<div class="note">' + escapeHtml(d.note) + '</div>' : '');
}

function renderEditForm(card) {
  const id = card.dataset.id;
  const [catId, en] = id.split('::');
  const d = getTermData(catId, en);
  if (!d) return;
  card.classList.add('is-editing');
  card.innerHTML =
    '<form class="edit-form" onsubmit="return false">' +
      '<div class="edit-row"><label>英文 (不可改)</label><input type="text" name="en" value="' + escapeHtml(d.en) + '" readonly></div>' +
      '<div class="edit-row"><label>音标</label><input type="text" name="phonetic" value="' + escapeHtml(d.phonetic) + '" placeholder="/kəmˈpoʊnənt/"></div>' +
      '<div class="edit-row"><label>中文</label><input type="text" name="zh" value="' + escapeHtml(d.zh) + '"></div>' +
      '<div class="edit-row"><label>解释</label><textarea name="hint" rows="2">' + escapeHtml(d.hint) + '</textarea></div>' +
      '<div class="edit-row"><label>个人笔记</label><textarea name="note" rows="3" placeholder="例句 / 关联词 / 记忆方法…">' + escapeHtml(d.note) + '</textarea></div>' +
      '<div class="edit-actions">' +
        '<button type="button" data-action="save">保存</button>' +
        '<button type="button" data-action="cancel">取消</button>' +
        '<button type="button" data-action="reset" title="清除该词所有自定义内容,恢复原样">重置</button>' +
      '</div>' +
    '</form>';
  const first = card.querySelector('[name=phonetic]');
  if (first) first.focus();
}

function applyState(card) {
  const id = card.dataset.id;
  card.classList.toggle('is-favorite', state.favorites.has(id));
  card.classList.toggle('is-deleted', state.deleted.has(id));
}

function makeCard(en, zh, hint, catId) {
  const t = document.createElement('div');
  t.className = 'term';
  t.dataset.id = catId + '::' + en;
  renderCardContent(t);
  return t;
}

function syncCardsById(id) {
  document.querySelectorAll('.term[data-id="' + CSS.escape(id) + '"]').forEach(renderCardContent);
}

let _enVoice = null;
function pickEnVoice() {
  if (_enVoice) return _enVoice;
  const voices = speechSynthesis.getVoices();
  _enVoice = voices.find(v => /en[-_]US/i.test(v.lang) && /female|samantha|google/i.test(v.name)) ||
             voices.find(v => /en[-_]US/i.test(v.lang)) ||
             voices.find(v => /^en/i.test(v.lang)) || null;
  return _enVoice;
}
if (typeof speechSynthesis !== 'undefined') {
  speechSynthesis.addEventListener('voiceschanged', () => { _enVoice = null; pickEnVoice(); });
}

function speakTerm(text, btn) {
  if (typeof speechSynthesis === 'undefined') {
    alert('浏览器不支持朗读 (Web Speech API)');
    return;
  }
  speechSynthesis.cancel();
  document.querySelectorAll('.speak.is-playing').forEach(b => b.classList.remove('is-playing'));
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.85;
  u.pitch = 1;
  const v = pickEnVoice();
  if (v) u.voice = v;
  if (btn) {
    btn.classList.add('is-playing');
    u.onend = u.onerror = () => btn.classList.remove('is-playing');
  }
  speechSynthesis.speak(u);
}

let total = 0;
DATA.forEach(cat => { total += cat.terms.length; });
totalCountEl.textContent = total;

DATA.forEach(cat => {
  const a = document.createElement('a');
  a.href = '#' + cat.id;
  a.textContent = cat.title + ' (' + cat.terms.length + ')';
  catsNav.appendChild(a);

  const section = document.createElement('section');
  section.id = cat.id;
  section.dataset.cat = cat.id;
  const h2 = document.createElement('h2');
  h2.innerHTML = '<span>' + cat.title + '</span><span class="count">' + cat.terms.length + ' 个</span>';
  section.appendChild(h2);
  const grid = document.createElement('div');
  grid.className = 'terms';
  cat.terms.forEach(([en, zh, hint]) => {
    grid.appendChild(makeCard(en, zh, hint, cat.id));
  });
  section.appendChild(grid);
  main.insertBefore(section, noResults);
});

function rebuildFavorites() {
  favGrid.innerHTML = '';
  const ids = [...state.favorites];
  favCountEl.textContent = ids.length + ' 个';
  if (ids.length === 0) {
    favSection.classList.remove('show');
    return;
  }
  favSection.classList.add('show');
  ids.forEach(id => {
    const [catId, en] = id.split('::');
    const cat = DATA.find(c => c.id === catId);
    if (!cat) return;
    const term = cat.terms.find(tt => tt[0] === en);
    if (!term) return;
    favGrid.appendChild(makeCard(term[0], term[1], term[2], catId));
  });
  applySearch();
}

function applySearch() {
  const q = state.query;
  let visible = 0;
  document.querySelectorAll('.term').forEach(t => {
    const match = !q || t.dataset.search.includes(q);
    t.classList.toggle('hidden-search', !match);
    if (match && !t.classList.contains('is-deleted')) visible++;
  });
  document.querySelectorAll('section[data-cat]').forEach(sec => {
    const any = [...sec.querySelectorAll('.term')].some(t =>
      !t.classList.contains('hidden-search') &&
      (!t.classList.contains('is-deleted') || state.showDeleted)
    );
    sec.classList.toggle('empty', !any);
  });
  if (favSection.classList.contains('show')) {
    const any = [...favGrid.querySelectorAll('.term')].some(t =>
      !t.classList.contains('hidden-search') &&
      (!t.classList.contains('is-deleted') || state.showDeleted)
    );
    favSection.classList.toggle('empty-search', !any && q);
    if (!any && q) favSection.style.display = 'none';
    else favSection.style.display = '';
  }
  noResults.classList.toggle('show', visible === 0 && q.length > 0);
}

function updateDelToggle() {
  const n = state.deleted.size;
  delToggle.textContent = (state.showDeleted ? '隐藏回收站 ' : '回收站 ') + n;
  delToggle.classList.toggle('show', n > 0);
  delToggle.classList.toggle('is-on', state.showDeleted);
  document.body.classList.toggle('show-deleted', state.showDeleted);
}

main.addEventListener('click', e => {
  const btn = e.target.closest('button[data-action]');
  if (!btn) return;
  const card = btn.closest('.term');
  if (!card) return;
  const id = card.dataset.id;
  const [catId, en] = id.split('::');
  const action = btn.dataset.action;

  if (action === 'speak') {
    speakTerm(en, btn);
    return;
  }

  if (action === 'edit') {
    document.querySelectorAll('.term.is-editing').forEach(c => {
      if (c.dataset.id !== id) renderCardContent(c);
    });
    renderEditForm(card);
    return;
  }

  if (action === 'cancel') {
    renderCardContent(card);
    return;
  }

  if (action === 'reset') {
    if (!confirm('清除该词的所有自定义内容(音标 / 笔记 / 中文 / 解释)?')) return;
    delete state.edits[id];
    save();
    syncCardsById(id);
    rebuildFavorites();
    applySearch();
    return;
  }

  if (action === 'save') {
    const form = btn.closest('form');
    const cat = DATA.find(c => c.id === catId);
    const orig = cat.terms.find(t => t[0] === en);
    const get = name => form.querySelector('[name=' + name + ']').value.trim();
    const phonetic = get('phonetic');
    const zh = get('zh');
    const hint = get('hint');
    const note = get('note');
    const edit = {};
    if (phonetic) edit.phonetic = phonetic;
    if (zh && zh !== orig[1]) edit.zh = zh;
    if (hint !== (orig[2] || '')) edit.hint = hint;
    if (note) edit.note = note;
    if (Object.keys(edit).length === 0) delete state.edits[id];
    else state.edits[id] = edit;
    save();
    syncCardsById(id);
    rebuildFavorites();
    applySearch();
    return;
  }

  if (action === 'fav') {
    if (state.favorites.has(id)) state.favorites.delete(id);
    else state.favorites.add(id);
  } else if (action === 'del') {
    if (state.deleted.has(id)) state.deleted.delete(id);
    else state.deleted.add(id);
  }
  save();
  syncCardsById(id);
  rebuildFavorites();
  updateDelToggle();
  applySearch();
});

search.addEventListener('input', e => {
  state.query = e.target.value.trim().toLowerCase();
  applySearch();
});

delToggle.addEventListener('click', () => {
  state.showDeleted = !state.showDeleted;
  save();
  updateDelToggle();
  applySearch();
});

rebuildFavorites();
updateDelToggle();

const themeBtn = document.getElementById('themeBtn');
function setTheme(t) {
  document.documentElement.dataset.theme = t;
  themeBtn.textContent = t === 'dark' ? '☀️ 浅色' : '🌙 暗色';
  localStorage.setItem('glossary-theme', t);
}
setTheme(localStorage.getItem('glossary-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
themeBtn.addEventListener('click', () => {
  setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
});
</script>

</body>
</html>
