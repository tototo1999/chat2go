<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>调试室 · Chat2GO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <script src="/vendor/supabase.js"
          onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'"></script>
  <script src="/vendor/marked.min.js"
          onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/marked@12/marked.min.js'"></script>
  <script src="/vendor/html2pdf.bundle.min.js"
          onerror="this.onerror=null;this.src='https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js'"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:    #1D9E75;
      --teal-50: #E1F5EE;
      --teal-100:#9FE1CB;
      --teal-600:#0F6E56;
      --teal-800:#085041;
      --purple:  #534AB7;
      --purple-50:#EEEDFE;
      --purple-100:#CECBF6;
      --purple-600:#3C3489;
      --gray-50: #F1EFE8;
      --gray-100:#D3D1C7;
      --gray-400:#888780;
      --bg:      #FAFAF8;
      --bg2:     #F4F3EF;
      --border:  rgba(60,58,54,0.12);
      --border2: rgba(60,58,54,0.22);
      --text:    #1a1a18;
      --text2:   #5f5e5a;
      --text3:   #888780;
      --radius:  8px;
      --radius-lg: 12px;
      --sidebar: 280px;
      --nav-h:   56px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      background: #fff;
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .logo {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--teal); }
    .nav-badge {
      padding: 3px 10px;
      background: var(--teal-50);
      color: var(--teal-600);
      font-size: 11px;
      font-weight: 500;
      border-radius: 100px;
    }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .user-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      border: 0.5px solid var(--border);
      border-radius: 100px;
      font-size: 12px;
      color: var(--text2);
      cursor: default;
    }
    .user-av {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--teal-50);
      color: var(--teal-800);
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-logout {
      padding: 6px 14px;
      font-size: 12px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }
    .btn-logout:hover { background: var(--bg2); color: var(--text); }

    /* ── LAYOUT ── */
    .layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar);
      flex-shrink: 0;
      border-right: 0.5px solid var(--border);
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-head {
      padding: 1rem 1rem 0.75rem;
      border-bottom: 0.5px solid var(--border);
    }
    .sidebar-title {
      font-size: 11px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text3);
      font-weight: 500;
      margin-bottom: 10px;
    }
    .btn-new-room {
      width: 100%;
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background .15s;
    }
    .btn-new-room:hover { background: var(--teal-600); }
    .btn-new-room i { font-size: 15px; }

    .rooms-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }
    .rooms-list::-webkit-scrollbar { width: 4px; }
    .rooms-list::-webkit-scrollbar-thumb { background: var(--gray-100); border-radius: 4px; }

    .room-item {
      padding: 10px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background .15s;
      border: 0.5px solid transparent;
      margin-bottom: 2px;
    }
    .room-item:hover { background: var(--bg2); }
    .room-item.active {
      background: var(--teal-50);
      border-color: var(--teal-100);
    }
    .room-name {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .room-item.active .room-name { color: var(--teal-800); }
    .room-meta {
      font-size: 11px;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .room-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--teal);
    }

    .rooms-empty {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--text3);
      font-size: 13px;
      line-height: 1.8;
    }

    /* ── CHAT PANEL ── */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      color: var(--text3);
    }
    .welcome i { font-size: 40px; color: var(--teal-100); margin-bottom: 1rem; }
    .welcome h3 { font-size: 16px; font-weight: 500; color: var(--text2); margin-bottom: 8px; }
    .welcome p { font-size: 13px; line-height: 1.7; max-width: 300px; }

    .chat-head {
      padding: 0 1.5rem;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
      background: #fff;
    }
    .chat-head-left { display: flex; align-items: center; gap: 10px; }
    .chat-room-name { font-size: 14px; font-weight: 500; }
    .chat-room-industry {
      padding: 2px 10px;
      background: var(--bg2);
      border-radius: 100px;
      font-size: 11px;
      color: var(--text3);
    }
    .online-count {
      font-size: 12px;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .online-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--teal);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .bridge-status {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
      transition: all .3s;
    }
    .bridge-status.online  { background: var(--teal-50);  color: var(--teal-600); }
    .bridge-status.offline { background: var(--gray-50);  color: var(--gray-400); }
    .bridge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .bridge-status.online  .bridge-dot { background: var(--teal); animation: pulse 2s ease-in-out infinite; }
    .bridge-status.offline .bridge-dot { background: var(--gray-400); }

    /* ── 飞书风消息布局：左头像 + 右侧 名字+时间+气泡 ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--gray-100); border-radius: 4px; }

    .msg-group {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 4px 0;
    }
    .msg-av {
      width: 32px;
      height: 32px;
      border-radius: 6px;             /* 飞书风：圆角方形 */
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg-av.user   { background: var(--bg2);       color: var(--text2); }
    .msg-av.expert { background: var(--purple-50); color: var(--purple-600); }
    .msg-av.ai     { background: var(--teal-50);   color: var(--teal-800); }

    .msg-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .msg-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      line-height: 1.2;
    }
    .msg-sender { font-size: 13px; font-weight: 500; color: var(--text); }
    .msg-role-badge {
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .msg-role-badge.user   { background: var(--gray-50); color: var(--gray-400); }
    .msg-role-badge.expert { background: var(--purple-50); color: var(--purple-600); }
    .msg-role-badge.ai     { background: var(--teal-50); color: var(--teal-600); }
    .msg-ts { font-size: 11px; color: var(--text3); }

    /* hover 出现的操作按钮 */
    .msg-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity .15s;
      margin-left: auto;
    }
    .msg-group:hover .msg-actions { opacity: 1; }
    .msg-action-btn {
      width: 22px; height: 22px;
      display: inline-flex;
      align-items: center; justify-content: center;
      border: none;
      background: transparent;
      color: var(--text3);
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all .15s;
    }
    .msg-action-btn:hover { background: var(--bg2); color: var(--text); }
    .msg-action-btn.copied { color: var(--teal); }

    .msg-bubble {
      padding: 9px 13px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.55;
      max-width: 100%;
      word-break: break-word;
      white-space: pre-wrap;
      align-self: flex-start;
      border-left: 3px solid transparent;
    }
    /* 三色区分，方便扫读 */
    .msg-bubble.user   { background: #FFF8E7;       border-left-color: #E5B85A; color: var(--text); }
    .msg-bubble.expert { background: var(--purple-50); border-left-color: var(--purple); color: var(--text); }
    .msg-bubble.ai     { background: var(--teal-50);   border-left-color: var(--teal);   color: var(--text); }

    .typing-indicator {
      display: none;
      padding: 0 1.5rem 0.5rem;
    }
    .typing-indicator.show { display: flex; }
    .typing-dots {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 14px;
      background: var(--teal-50);
      border-radius: 2px 12px 12px 12px;
    }
    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--teal-600);
      animation: dot-bounce 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    .input-area {
      padding: 1rem 1.5rem;
      border-top: 0.5px solid var(--border);
      background: #fff;
      flex-shrink: 0;
    }
    .input-wrap {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-box {
      flex: 1;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      resize: none;
      outline: none;
      transition: border-color .15s;
      line-height: 1.6;
      max-height: 140px;
      min-height: 42px;
    }
    .input-box:focus { border-color: var(--teal); background: #fff; }
    .input-box::placeholder { color: var(--text3); }
    .send-btn {
      padding: 10px 18px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      height: 42px;
    }
    .send-btn:hover { background: var(--teal-600); }
    .send-btn:disabled { background: var(--gray-100); color: var(--gray-400); cursor: not-allowed; }
    .send-btn i { font-size: 16px; }

    .input-hint {
      margin-top: 6px;
      font-size: 11px;
      color: var(--text3);
    }

    /* ── 附件 ── */
    .attach-btn, .voice-btn {
      width: 38px;
      height: 42px;
      flex-shrink: 0;
      background: transparent;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }
    .attach-btn:hover, .voice-btn:hover { background: var(--bg2); color: var(--teal); border-color: var(--teal-100); }
    .attach-btn i, .voice-btn i { font-size: 18px; }

    .voice-btn.recording {
      background: #FDE8E8;
      border-color: #F5A0A0;
      color: #9B1C1C;
      animation: voicePulse 1s ease-in-out infinite;
    }
    @keyframes voicePulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(155, 28, 28, 0.4); }
      50%      { box-shadow: 0 0 0 6px rgba(155, 28, 28, 0); }
    }

    .attach-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .attach-preview:empty { display: none; }
    .attach-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px 5px 10px;
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text);
    }
    .attach-chip i.file { font-size: 14px; color: var(--teal); }
    .attach-chip .thumb { width: 22px; height: 22px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
    .attach-chip .name { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .attach-chip .size { color: var(--text3); font-size: 10px; }
    .attach-chip .x {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px;
      border-radius: 50%;
      cursor: pointer;
      color: var(--text3);
      transition: all .15s;
    }
    .attach-chip .x:hover { background: var(--gray-100); color: var(--text); }
    .attach-chip.uploading { opacity: 0.6; }
    .attach-chip.uploading .name::after { content: ' (上传中…)'; color: var(--text3); font-size: 10px; }

    /* 已发送消息里的附件卡片 */
    .msg-attachments { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .msg-attachment {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: #fff;
      border: 0.5px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      text-decoration: none;
      color: var(--text);
      max-width: 300px;
    }
    .msg-attachment:hover { border-color: var(--teal-100); background: var(--teal-50); }
    .msg-attachment i { font-size: 16px; color: var(--teal); flex-shrink: 0; }
    .msg-attachment .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* 消息内图片直接显示（不走 chip） */
    .msg-image {
      display: block;
      max-width: 320px;
      max-height: 240px;
      border-radius: 6px;
      border: 0.5px solid var(--border);
      cursor: zoom-in;
      margin-top: 4px;
    }
    .msg-image:hover { border-color: var(--teal-100); }

    /* ── NEW ROOM MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      margin: 1rem;
    }
    .modal h3 {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    .modal .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .modal label { font-size: 13px; font-weight: 500; color: var(--text2); }
    .modal input, .modal select {
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    .modal input:focus, .modal select:focus { border-color: var(--teal); }
    .modal-actions { display: flex; gap: 8px; margin-top: 1.5rem; }
    .btn-cancel {
      flex: 1;
      padding: 10px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: background .15s;
    }
    .btn-cancel:hover { background: var(--bg2); }
    .btn-create {
      flex: 1;
      padding: 10px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background .15s;
    }
    .btn-create:hover { background: var(--teal-600); }
    .btn-create:disabled { background: var(--gray-100); color: var(--gray-400); cursor: not-allowed; }

    /* ── MARKDOWN 渲染 ── */
    .msg-bubble.markdown {
      padding: 0;
      background: transparent;
      border-radius: 0;
    }
    .md-body {
      padding: 10px 14px;
      background: var(--teal-50);
      border-left: 3px solid var(--teal);
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.55;
      max-width: 100%;
      align-self: flex-start;
    }
    .md-body > *:first-child { margin-top: 0 !important; }
    .md-body > *:last-child  { margin-bottom: 0 !important; }
    .md-body h1, .md-body h2, .md-body h3, .md-body h4 {
      font-family: 'Noto Serif SC', serif;
      font-weight: 600;
      margin: 0.5rem 0 0.15rem;
      line-height: 1.3;
    }
    .md-body h1 { font-size: 14px; border-bottom: 0.5px solid var(--teal-100); padding-bottom: 3px; }
    .md-body h2 { font-size: 13.5px; }
    .md-body h3 { font-size: 13px; }
    .md-body h4 { font-size: 13px; color: var(--text2); margin: 0.35rem 0 0.1rem; }
    .md-body p  { margin: 0.2rem 0; }
    .md-body ul, .md-body ol { padding-left: 1.2rem; margin: 0.2rem 0; }
    .md-body li { margin: 0; }
    /* 关键：marked 把松散列表的每项包成 <p>，干掉它的边距 */
    .md-body li > p { margin: 0; }
    .md-body li + li { margin-top: 1px; }
    .md-body strong { font-weight: 600; }
    .md-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.4rem 0;
      font-size: 12px;
    }
    .md-body th, .md-body td {
      border: 0.5px solid var(--teal-100);
      padding: 3px 7px;
      text-align: left;
    }
    .md-body th { background: var(--teal-100); font-weight: 500; }
    .md-body tr:nth-child(even) { background: rgba(29,158,117,0.04); }
    .md-body code {
      background: rgba(29,158,117,0.1);
      padding: 1px 4px;
      border-radius: 3px;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 11px;
    }
    .md-body pre { background: #1a1a18; border-radius: 6px; padding: 6px 9px; overflow-x: auto; margin: 0.3rem 0; }
    .md-body pre code { background: none; color: #e8e6e0; font-size: 11px; }
    .md-body blockquote {
      border-left: 2px solid var(--teal-100);
      padding: 1px 8px;
      color: var(--text2);
      margin: 0.3rem 0;

    }
    .md-body hr { border: none; border-top: 0.5px solid var(--teal-100); margin: 0.5rem 0; }
    /* 连续空行折叠 */
    .md-body br + br { display: none; }

    .pdf-bar {
      display: flex;
      align-items: center;
      gap: 8px;

      padding: 3px 10px;

    .skeleton {
      background: linear-gradient(90deg, var(--bg2) 25%, var(--gray-50) 50%, var(--bg2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: var(--radius);
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-room { height: 52px; margin-bottom: 4px; }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      padding: 10px 18px;
      background: var(--text);
      color: #fff;
      border-radius: var(--radius);
      font-size: 13px;
      z-index: 2000;
      opacity: 0;
      transition: all .25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 640px) {
      .sidebar { display: none; }
      .sidebar.mobile-show { display: flex; position: fixed; inset: 0; z-index: 50; width: 100%; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="/" class="logo">Chat<span>2GO</span></a>
    <span class="nav-badge">Chat · 调试室</span>
  </div>
  <div class="nav-right">

</nav>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-title">调试室列表</div>
      <button class="btn-new-room" onclick="openNewRoomModal()">
        <i class="ti ti-plus"></i> 新建调试室
      </button>
    </div>
    <div class="rooms-list" id="roomsList">
      <div class="skeleton skeleton-room"></div>
      <div class="skeleton skeleton-room"></div>
      <div class="skeleton skeleton-room"></div>
    </div>
  </aside>

  <div class="chat-panel" id="chatPanel">
    <div class="welcome" id="welcomeState">
      <i class="ti ti-messages"></i>
      <h3>选择一个调试室开始对话</h3>
      <p>大咖、用户和 AI 三方在这里协作，把你的需求说清楚，调出属于你的专属 AI 助手。</p>
    </div>

    <div id="activeChat" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
      <div class="chat-head">
        <div class="chat-head-left">
          <span class="chat-room-name" id="chatRoomName">-</span>
          <span class="chat-room-industry" id="chatRoomIndustry">-</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="bridge-status offline" id="bridgeStatus">
            <div class="bridge-dot"></div>
            <span id="bridgeLabel">AI 未连接</span>
          </div>
          <div class="online-count">
            <div class="online-dot"></div>
            实时在线
          </div>
        </div>
      </div>

      <div class="messages" id="messagesList"></div>

      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="input-area">
        <!-- 待上传的附件预览 -->
        <div class="attach-preview" id="attachPreview"></div>

        <div class="input-wrap">
          <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="上传文件给 AI 看">
            <i class="ti ti-paperclip"></i>
          </button>
          <input type="file" id="fileInput" multiple style="display:none"
                 accept=".txt,.md,.pdf,.docx,.csv,.json,.html,.htm,.xml,image/*"
                 onchange="onFilePick(event)">
          <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()" title="按住说话（中文识别）">
            <i class="ti ti-microphone"></i>
          </button>
          <textarea
            class="input-box"
            id="msgInput"
            placeholder="输入消息，AI 会在这里回应你... (可粘贴图片)"
            rows="1"

</div>

<div class="modal-overlay" id="newRoomModal" onclick="closeNewRoomModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>新建调试室</h3>
    <div class="field">

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://qjnagbzqhoansixqharb.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqbmFnYnpxaG9hbnNpeHFoYXJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNDIxODIsImV4cCI6MjA5MzkxODE4Mn0.GpMUVTk6JvqeciXagXQiJunc8TLFMHg3_b9reIjJ2Y8'
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  let currentUser = null
  let currentRoom = null
  let realtimeChannel = null
  let pendingAttachments = []  // 待发送的附件 [{name, url, size, mime_type, storage_path}]

  async function init() {
    const { data: { session } } = await sb.auth.getSession()
    if (!session) { window.location.href = '/login.html'; return }
    currentUser = session.user

    const email = currentUser.email
    document.getElementById('userEmail').textContent = email
    document.getElementById('userAv').textContent = email[0].toUpperCase()

    await loadRooms()
  }

  async function loadRooms() {
    const { data: rooms, error } = await sb
      .from('rooms')
      .select('*')
      .order('created_at', { ascending: false })

    const list = document.getElementById('roomsList')
    list.innerHTML = ''

    if (error || !rooms || rooms.length === 0) {
      list.innerHTML = `<div class="rooms-empty">还没有调试室<br>点击上方按钮新建一个</div>`
      return
    }

    rooms.forEach(room => renderRoomItem(room))
  }

  function renderRoomItem(room) {
    const list = document.getElementById('roomsList')
    const empty = list.querySelector('.rooms-empty')
    if (empty) empty.remove()

    const el = document.createElement('div')
    el.className = 'room-item'
    el.dataset.id = room.id
    el.innerHTML = `
      <div class="room-name">${escHtml(room.name)}</div>
      <div class="room-meta"><div class="room-dot"></div>${escHtml(room.industry)}</div>
    `
    el.onclick = () => openRoom(room)
    list.appendChild(el)
  }

  function isExpert(room) {
    return room.expert_id === currentUser?.id
  }

  async function openRoom(room) {
    currentRoom = room

    document.querySelectorAll('.room-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === room.id)
    })

    document.getElementById('chatRoomName').textContent = room.name
    document.getElementById('chatRoomIndustry').textContent = room.industry

    document.getElementById('msgInput').placeholder = '输入消息，AI 会在这里回应你…(可粘贴图片)'
    document.getElementById('roleHint').textContent = '按 Enter 发送 · Shift+Enter 换行 · 📎 上传 · 🎤 语音输入'

    document.getElementById('welcomeState').style.display = 'none'
    const ac = document.getElementById('activeChat')
    ac.style.display = 'flex'

    await loadMessages(room.id)
    subscribeRoom(room.id)
    document.getElementById('msgInput').focus()
  }

  async function loadMessages(roomId) {
    document.getElementById('messagesList').innerHTML = ''

    const { data: msgs, error } = await sb
      .from('messages')
      .select('*')
      .eq('room_id', roomId)
      .order('created_at', { ascending: true })

    if (error) { showToast('加载消息失败'); return }
    if (msgs) msgs.forEach(m => appendMessage(m))
    scrollToBottom()

    // 如果房间近 10 分钟内有 AI 消息，认为 bridge 在线
    if (msgs && msgs.length > 0) {
      const tenMinAgo = Date.now() - 10 * 60 * 1000
      const recentAi = msgs.some(m => m.role === 'ai' && new Date(m.created_at).getTime() > tenMinAgo)
      setBridgeStatus(recentAi)
    } else {
      setBridgeStatus(false)
    }
  }

  function subscribeRoom(roomId) {
    if (realtimeChannel) sb.removeChannel(realtimeChannel)

    realtimeChannel = sb
      .channel(`room-${roomId}`)
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'messages',
        filter: `room_id=eq.${roomId}`
      }, payload => {
        const exists = document.querySelector(`[data-msg-id="${payload.new.id}"]`)
        if (!exists) {
          if (payload.new.role === 'ai') {
            clearTimeout(typingTimer)
            hideTyping()
            setBridgeStatus(true)
            lastAiMessageAt = Date.now()
          }
          appendMessage(payload.new)
          scrollToBottom()
        }
      })
      .subscribe()
  }

  function appendMessage(msg) {
    const list = document.getElementById('messagesList')
    const role = msg.role
    const isOwn = msg.user_id === currentUser?.id
    const isMarkdown = msg.type === 'markdown' || (role === 'ai' && looksLikeMarkdown(msg.content))

    const roleLabels = { user: '用户', expert: '大咖', ai: 'AI 助手' }
    const roleLabel = roleLabels[role] || role
    const avText = role === 'ai' ? 'AI' : role === 'expert' ? '专' : '用'
    const senderName = isOwn ? (role === 'expert' ? '我（大咖）' : '我') : roleLabel
    const ts = formatTime(msg.created_at)

    const el = document.createElement('div')
    el.className = 'msg-group'
    el.dataset.msgId = msg.id

    const attachments = Array.isArray(msg.attachments) ? msg.attachments : []
    const attachHtml = attachments.length ? `
      <div class="msg-attachments">
        ${attachments.map(a => {
          const isImage = (a.mime_type || '').startsWith('image/') || /\.(png|jpe?g|gif|webp|bmp)$/i.test(a.name || '')
          if (isImage) {
            return `<a href="${escHtml(a.url)}" target="_blank" rel="noopener">
              <img class="msg-image" src="${escHtml(a.url)}" alt="${escHtml(a.name)}">
            </a>`
          }
          return `
            <a class="msg-attachment" href="${escHtml(a.url)}" target="_blank" rel="noopener">
              <i class="ti ti-file"></i>
              <span class="name">${escHtml(a.name)}</span>
              <span style="color:var(--text3);font-size:10px;">${formatSize(a.size || 0)}</span>
            </a>`
        }).join('')}
      </div>` : ''

    const isPlaceholderMsg = attachments.length > 0 && /^\[发送了 \d+ 个文件\]$/.test(msg.content)
    const bubbleHtml = isMarkdown
      ? `<div class="msg-bubble markdown" style="padding:0;background:transparent;border:none;">
           <div class="md-body" id="md-${msg.id}">${marked.parse(msg.content)}</div>
           <div class="pdf-bar">
             <button class="btn-pdf" onclick="exportPdf('md-${msg.id}', '文档')">
               <i class="ti ti-file-type-pdf"></i> 下载 PDF
             </button>
             <span class="pdf-hint">AI 生成 · 请核对</span>
           </div>
         </div>`
      : (isPlaceholderMsg
          ? ''  // 纯文件消息不显示气泡，只显示附件卡片
          : `<div class="msg-bubble ${role}">${escHtml(msg.content)}</div>`)

    // 把原始文本存起来供复制（HTML 转义后再 unescape 不可靠，直接 base64 编码绕过）
    const rawB64 = btoa(unescape(encodeURIComponent(msg.content || '')))

    el.innerHTML = `
      <div class="msg-av ${role}">${avText}</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-sender">${senderName}</span>
          <span class="msg-role-badge ${role}">${roleLabel}</span>
          <span class="msg-ts">${ts}</span>
          <div class="msg-actions">
            <button class="msg-action-btn" title="复制" onclick="copyMessage(this, '${rawB64}')">
              <i class="ti ti-copy"></i>
            </button>
          </div>
        </div>
        ${bubbleHtml}
        ${attachHtml}
      </div>
    `
    list.appendChild(el)
  }

  function looksLikeMarkdown(text) {
    return /^#{1,3} /m.test(text) || /\|.+\|.+\|/.test(text) || /^[-*] /m.test(text)
  }

  function exportPdf(elemId, filename) {
    const el = document.getElementById(elemId)
    if (!el) return
    const opt = {
      margin:      [12, 14, 12, 14],
      filename:    filename + '_' + new Date().toISOString().slice(0,10) + '.pdf',
      image:       { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true },
      jsPDF:       { unit: 'mm', format: 'a4', orientation: 'portrait' },
    }
    html2pdf().set(opt).from(el).save()
  }

  function scrollToBottom() {
    const list = document.getElementById('messagesList')
    list.scrollTop = list.scrollHeight
  }

  // Track when we last saw an AI message, to infer bridge online status
  let lastAiMessageAt = 0
  let typingTimer = null

  async function sendMessage() {
    if (!currentRoom) return
    const input = document.getElementById('msgInput')
    const content = input.value.trim()
    // 必须有内容或附件之一
    if (!content && pendingAttachments.length === 0) return

    // 等所有附件上传完
    if (pendingAttachments.some(a => a.uploading)) {
      showToast('附件还在上传中，请稍候')
      return
    }

    input.value = ''
    autoResize(input)

    const sendBtn = document.getElementById('sendBtn')
    sendBtn.disabled = true

    const role = isExpert(currentRoom) ? 'expert' : 'user'
    const finalContent = content || `[发送了 ${pendingAttachments.length} 个文件]`
    const attachments = pendingAttachments.map(a => ({
      name: a.name, url: a.url, size: a.size, mime_type: a.mime_type, storage_path: a.storage_path
    }))

    const { data: msgData, error } = await sb.from('messages').insert({
      room_id: currentRoom.id,
      user_id: currentUser.id,
      role,
      content: finalContent,
      attachments
    }).select().single()

    if (error) {
      console.error('insert message failed:', error)
      showToast('发送失败：' + (error.message || error.details || JSON.stringify(error)).slice(0, 100))
      sendBtn.disabled = false
      return
    }

    pendingAttachments = []
    renderAttachPreview()

    sendBtn.disabled = false
    input.focus()

    appendMessage(msgData)
    scrollToBottom()

    // 任何非 AI 角色发消息都触发 AI 响应
    showTyping()
    clearTimeout(typingTimer)
    typingTimer = setTimeout(() => {
      hideTyping()
      setBridgeStatus(false)
    }, 30000)
  }

  function setBridgeStatus(online) {
    const el = document.getElementById('bridgeStatus')
    const label = document.getElementById('bridgeLabel')
    el.className = 'bridge-status ' + (online ? 'online' : 'offline')
    label.textContent = online ? 'AI 已连接' : 'AI 未连接'
  }

  function showTyping() {
    document.getElementById('typingIndicator').classList.add('show')
    scrollToBottom()
  }
  function hideTyping() {
    document.getElementById('typingIndicator').classList.remove('show')
  }

  function openNewRoomModal() {
    document.getElementById('newRoomModal').classList.add('show')
    document.getElementById('newRoomName').focus()
  }
  function closeNewRoomModal(e) {
    if (e && e.target !== document.getElementById('newRoomModal')) return
    document.getElementById('newRoomModal').classList.remove('show')
  }

  async function createRoom() {
    const name = document.getElementById('newRoomName').value.trim()
    const industry = document.getElementById('newRoomIndustry').value
    if (!name) { document.getElementById('newRoomName').focus(); return }

    const btn = document.getElementById('createRoomBtn')
    btn.disabled = true; btn.textContent = '创建中...'

    const { data: room, error } = await sb.from('rooms').insert({
      name,
      industry,
      expert_id: currentUser.id,
      status: 'active'
    }).select().single()

    btn.disabled = false; btn.textContent = '创建'

    if (error) { showToast('创建失败：' + error.message); return }

    document.getElementById('newRoomModal').classList.remove('show')
    document.getElementById('newRoomName').value = ''

    renderRoomItem(room)
    openRoom(room)
    showToast('调试室创建成功')
  }

  async function handleLogout() {
    await sb.auth.signOut()
    window.location.href = '/login.html'
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault()
      sendMessage()
    }
  }

  function autoResize(el) {
    el.style.height = 'auto'
    el.style.height = Math.min(el.scrollHeight, 140) + 'px'
  }

  // ── 附件上传 ──
  async function onPasteImage(e) {
    const items = (e.clipboardData || window.clipboardData)?.items
    if (!items) return
    const images = []
    for (const item of items) {
      if (item.type && item.type.startsWith('image/')) {
        const file = item.getAsFile()
        if (file) images.push(file)
      }
    }
    if (images.length === 0) return  // 普通文字粘贴，让默认行为发生
    e.preventDefault()
    for (const blob of images) {
      const ext = (blob.type.split('/')[1] || 'png').replace('+xml', '')
      const named = new File([blob], `截图_${Date.now()}.${ext}`, { type: blob.type })
      await uploadOneFile(named)
    }
  }

  async function onFilePick(e) {
    const files = Array.from(e.target.files || [])
    e.target.value = ''  // 允许重复选同一个文件
    for (const file of files) {
      await uploadOneFile(file)
    }
  }

  async function uploadOneFile(file) {
    if (file.size > 20 * 1024 * 1024) {
      showToast(`${file.name} 超过 20MB，跳过`); return
    }
    const stub = {
      name: file.name, size: file.size, mime_type: file.type || 'application/octet-stream',
      url: '', storage_path: '', uploading: true,
      // 本地预览（图片用 dataURL，纯前端，不依赖网络）
      preview: file.type.startsWith('image/') ? URL.createObjectURL(file) : ''
    }
    pendingAttachments.push(stub)
    renderAttachPreview()
    try {
        // 清洗文件名：保留扩展名，非 ASCII / 特殊字符替换为下划线
        // （Supabase Storage 对路径里的非 ASCII 字符不友好，会 400）
        const ext = (file.name.match(/\.[^.]+$/) || [''])[0].toLowerCase()
        const safeBase = file.name
          .replace(/\.[^.]+$/, '')               // 去扩展名
          .replace(/[^\w\-]+/g, '_')              // 非字母数字下划线连字符 → _
          .replace(/_+/g, '_')                    // 连续 _ 合并
          .replace(/^_+|_+$/g, '')                // 首尾 _ 去掉
          .slice(0, 40) || 'file'                 // 限长
        const safeName = `${safeBase}${ext}`
        const path = `${currentUser.id}/${Date.now()}_${Math.random().toString(36).slice(2, 8)}_${safeName}`

        const { error } = await sb.storage.from('chat-uploads').upload(path, file, {
          cacheControl: '3600', upsert: false, contentType: file.type || 'application/octet-stream'
        })
        if (error) throw error
        const { data: pub } = sb.storage.from('chat-uploads').getPublicUrl(path)
        stub.url = pub.publicUrl
        stub.storage_path = path
        stub.uploading = false
    } catch (err) {
      console.error('upload failed:', err)
      showToast(`上传失败：${file.name} - ${err.message || err}`)
      pendingAttachments = pendingAttachments.filter(a => a !== stub)
    }
    renderAttachPreview()
  }

  function renderAttachPreview() {
    const wrap = document.getElementById('attachPreview')
    wrap.innerHTML = pendingAttachments.map((a, i) => {
      const thumb = a.preview
        ? `<img src="${a.preview}" class="thumb" alt="">`
        : `<i class="ti ti-file file"></i>`
      return `
        <div class="attach-chip ${a.uploading ? 'uploading' : ''}">
          ${thumb}
          <span class="name">${escHtml(a.name)}</span>
          <span class="size">${formatSize(a.size)}</span>
          <span class="x" onclick="removeAttachment(${i})"><i class="ti ti-x"></i></span>
        </div>`
    }).join('')
  }

  function removeAttachment(i) {
    pendingAttachments.splice(i, 1)
    renderAttachPreview()
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + 'B'
    if (bytes < 1024 * 1024) return Math.round(bytes / 1024) + 'KB'
    return (bytes / 1024 / 1024).toFixed(1) + 'MB'
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
  }

  function formatTime(iso) {
    const d = new Date(iso)
    const h = d.getHours().toString().padStart(2, '0')
    const m = d.getMinutes().toString().padStart(2, '0')
    return `${h}:${m}`
  }

  // ── 语音输入 ──
  let recognition = null
  let isRecording = false
  let voiceTextBefore = ''   // 开始录音前输入框已有的内容

  function getRecognition() {
    if (recognition) return recognition
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition
    if (!SR) return null
    recognition = new SR()
    recognition.lang = 'zh-CN'
    recognition.continuous = true
    recognition.interimResults = true   // 边说边出文字

    recognition.onresult = (event) => {
      let finalText = ''
      let interimText = ''
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript
        if (event.results[i].isFinal) finalText += transcript
        else interimText += transcript
      }
      const input = document.getElementById('msgInput')
      input.value = (voiceTextBefore + finalText + interimText).trim()
      autoResize(input)
      // 累积已确认的部分
      if (finalText) voiceTextBefore = (voiceTextBefore + finalText).trim() + ' '
    }

    recognition.onerror = (e) => {
      console.error('voice error:', e)
      stopVoice()
      if (e.error === 'not-allowed') showToast('麦克风权限被拒，请到 chrome://settings 允许 chat2go.cn 使用麦克风')
      else if (e.error === 'no-speech') {} // 无语音不报错
      else showToast('语音识别错误：' + e.error)
    }

    recognition.onend = () => {
      // 用户停止说话后浏览器会自动 onend，再次 start 才能继续
      if (isRecording) {
        try { recognition.start() } catch(e) {}
      }
    }
    return recognition
  }

  function toggleVoice() {
    if (isRecording) stopVoice()
    else startVoice()
  }

  function startVoice() {
    const r = getRecognition()
    if (!r) {
      showToast('当前浏览器不支持语音识别（建议 Chrome / Edge / Safari）')
      return
    }
    voiceTextBefore = document.getElementById('msgInput').value
    if (voiceTextBefore && !voiceTextBefore.endsWith(' ')) voiceTextBefore += ' '
    isRecording = true
    document.getElementById('voiceBtn').classList.add('recording')
    try { r.start() } catch(e) { console.warn(e) }
    showToast('开始说话…')
  }

  function stopVoice() {
    isRecording = false
    document.getElementById('voiceBtn').classList.remove('recording')
    if (recognition) {
      try { recognition.stop() } catch(e) {}
    }
  }

  async function copyMessage(btn, b64) {
    let text = ''
    try {
      text = decodeURIComponent(escape(atob(b64)))
    } catch (e) { text = atob(b64) }
    try {
      await navigator.clipboard.writeText(text)
      btn.classList.add('copied')
      btn.innerHTML = '<i class="ti ti-check"></i>'
      showToast('已复制')
      setTimeout(() => {
        btn.classList.remove('copied')
        btn.innerHTML = '<i class="ti ti-copy"></i>'
      }, 1500)
    } catch (e) {
      // 降级方案：fallback to textarea
      const ta = document.createElement('textarea')
      ta.value = text
      ta.style.position = 'fixed'; ta.style.opacity = '0'
      document.body.appendChild(ta)
      ta.select()
      try { document.execCommand('copy'); showToast('已复制') }
      catch { showToast('复制失败') }
      ta.remove()
    }
  }

  function showToast(msg) {
    const el = document.getElementById('toast')
    el.textContent = msg
    el.classList.add('show')
    setTimeout(() => el.classList.remove('show'), 2500)
  }

  init()
</script>
</body>
</html>
