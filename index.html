<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Chat2GO · 真人大咖 × AI</title>
  <meta name="description" content="选一位行业大咖，让 AI 帮你把需求说清楚。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:    #1D9E75;
      --teal-50: #E1F5EE;
      --teal-600:#0F6E56;
      --bg:      #FAFAF8;
      --bg2:     #DDDCD6;
      --border:  rgba(60,58,54,0.12);
      --border2: rgba(60,58,54,0.22);
      --text:    #1a1a18;
      --text2:   #5f5e5a;
      --text3:   #888780;
    }

    html { background: var(--bg2); }
    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      max-width: 800px;
      margin: 0 auto;
      border-left: 0.5px solid var(--border);
      border-right: 0.5px solid var(--border);
      min-height: 100vh;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 2rem;
      border-bottom: 0.5px solid var(--border);
    }
    .logo {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.3px;
    }
    .logo span { color: var(--teal); }
    .btn-login {
      padding: 6px 14px;
      font-size: 12px;
      font-family: inherit;
      border: 0.5px solid var(--border2);
      border-radius: 8px;
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      transition: all .15s;
    }
    .btn-login:hover { background: var(--bg2); color: var(--text); }

    /* 主区：上方一行 tagline，下面四张卡 */
    main {
      padding: 4rem 2rem 5rem;
    }
    .tagline {
      font-family: 'Noto Serif SC', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.3px;
      margin-bottom: 3.5rem;
    }
    .tagline em { color: var(--teal); font-style: normal; font-weight: 600; }

    .expert-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 0.5px solid var(--border);
    }
    .expert-card {
      background: var(--bg);
      padding: 2rem 1.75rem;
      cursor: pointer;
      transition: background .2s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      min-height: 200px;
    }
    .expert-card:hover {
      background: var(--bg2);
    }
    .expert-card:hover .expert-arrow { transform: translateX(4px); color: var(--teal); }
    .expert-card.disabled {
      cursor: default;
      color: var(--text3);
    }
    .expert-card.disabled:hover { background: var(--bg); }
    .expert-card.disabled .expert-arrow { display: none; }
    .expert-card.disabled .expert-tag { opacity: 0.55; }
    .expert-card.disabled .expert-name { opacity: 0.55; }
    .expert-tag {
      font-size: 11px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--text3);
      font-weight: 500;
      margin-bottom: 1.25rem;
    }
    .expert-name {
      font-family: 'Noto Serif SC', serif;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 0.4rem;
    }
    .expert-desc {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.65;
      flex: 1;
    }
    .expert-arrow {
      align-self: flex-end;
      font-size: 18px;
      color: var(--text3);
      transition: transform .2s, color .2s;
      margin-top: 1rem;
    }

    footer {
      padding: 1.5rem 2rem;
      border-top: 0.5px solid var(--border);
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      letter-spacing: 0.3px;
    }

    @media (max-width: 640px) {
      body { border: none; }
      main { padding: 2.5rem 1.25rem 3rem; }
      .tagline { font-size: 19px; }
      .expert-grid { grid-template-columns: 1fr; }
      .expert-card { padding: 1.75rem 1.5rem; min-height: 160px; }
      .expert-name { font-size: 22px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="logo">Chat<span>2GO</span></a>
    <button class="btn-login" onclick="location.href='/login.html'">登录</button>
  </nav>

  <main>
    <div class="tagline">真人大咖 × AI，<em>说清楚</em>你想要什么。</div>

    <div class="expert-grid">
      <a class="expert-card" href="/login.html?expert=moriyama">
        <div class="expert-tag">fortune teller</div>
        <div class="expert-name">森山大道 san</div>
        <div class="expert-arrow">→</div>
      </a>

      <div class="expert-card disabled">
        <div class="expert-tag">real estate</div>
        <div class="expert-name">Tony 哥</div>
      </div>

      <div class="expert-card disabled">
        <div class="expert-tag">cantonese bbq</div>
        <div class="expert-name">戴维斯</div>
      </div>

      <div class="expert-card disabled">
        <div class="expert-tag">rehab</div>
        <div class="expert-name">大白老师</div>
      </div>
    </div>
  </main>

  <footer>
    © 2026 Chat2GO
  </footer>

</body>
</html>
