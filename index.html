<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Chat2GO</title>
  <meta name="description" content="选一位行业大咖，让 AI 帮你把需求说清楚。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:    #1D9E75;
      --teal-50: #E1F5EE;
      --teal-600:#0F6E56;
      --bg:      #FAFAF8;
      --bg2:     #DDDCD6;
      --border:  rgba(60,58,54,0.12);
      --border2: rgba(60,58,54,0.22);
      --text:    #1a1a18;
      --text2:   #5f5e5a;
      --text3:   #888780;
    }

    html { background: var(--bg2); }
    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      max-width: 800px;
      margin: 0 auto;
      border-left: 0.5px solid var(--border);
      border-right: 0.5px solid var(--border);
      min-height: 100vh;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 2rem;
      border-bottom: 0.5px solid var(--border);
    }
    .logo {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.3px;
    }
    .logo span { color: var(--teal); }
    .btn-login, .btn-logout {
      padding: 6px 14px;
      font-size: 12px;
      font-family: inherit;
      border: 0.5px solid var(--border2);
      border-radius: 8px;
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      transition: all .15s;
    }
    .btn-login:hover, .btn-logout:hover { background: var(--bg2); color: var(--text); }
    .nav-right { display: flex; align-items: center; gap: 8px; }
    .nav-user {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px 3px 3px;
      border-radius: 999px;
      background: #fff;
      border: 0.5px solid var(--border);
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      text-decoration: none;
      color: var(--text);
      font-size: 12px;
      transition: background .15s, transform .12s;
    }
    .nav-user:hover { transform: translateY(-1px); background: var(--teal-50); }
    .user-av {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--teal);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
    }

    /* 主区：上方一行 tagline，下面四张卡 */
    main {
      padding: 1.75rem 2rem 4rem;
    }
    .tagline {
      font-family: 'Noto Serif SC', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.3px;
      margin-bottom: 1.5rem;
    }
    .tagline em { color: var(--teal); font-style: normal; font-weight: 600; }

    .expert-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 0.5px solid var(--border);
    }
    .expert-card {
      background: var(--bg);
      padding: 2rem 1.75rem;
      cursor: pointer;
      transition: background .2s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      min-height: 200px;
    }
    .expert-card:hover {
      background: var(--bg2);
    }
    .expert-card:hover .expert-arrow { transform: translateX(4px); color: var(--teal); }
    .expert-card.disabled {
      cursor: default;
      color: var(--text3);
    }
    .expert-card.disabled:hover { background: var(--bg); }
    .expert-card.disabled .expert-arrow { display: none; }
    .expert-card.disabled .expert-tag { opacity: 0.55; }
    .expert-card.disabled .expert-name { opacity: 0.55; }
    .expert-tag {
      font-size: 11px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--text3);
      font-weight: 500;
      margin-bottom: 1.25rem;
    }
    .expert-name {
      font-family: 'Noto Serif SC', serif;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 0.4rem;
    }
    .expert-desc {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.65;
      flex: 1;
    }
    .expert-arrow {
      align-self: flex-end;
      font-size: 18px;
      color: var(--text3);
      transition: transform .2s, color .2s;
      margin-top: 1rem;
    }
    /* follow 胶囊：左半 ♥（关注） + 右半数字（看 follower 列表） */
    .follow-pill {
      align-self: flex-end;
      margin-top: 1rem;
      display: inline-flex;
      align-items: stretch;
      background: var(--teal);
      color: #fff;
      border-radius: 999px;
      overflow: hidden;
      font-family: inherit;
      font-size: 11px;
      line-height: 1;
      box-shadow: 0 1px 2px rgba(0,0,0,.06);
    }
    .follow-pill button {
      background: transparent;
      color: inherit;
      border: 0;
      padding: 4px 8px;
      font: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .follow-pill button:hover { background: rgba(255,255,255,.18); }
    .follow-pill button:disabled { opacity: 0.6; cursor: default; }
    .follow-pill .pf-heart { font-size: 11px; padding: 4px 7px; }
    .follow-pill .pf-divider {
      width: 0.5px;
      background: rgba(255,255,255,.32);
      align-self: stretch;
    }
    .follow-pill .pf-count { min-width: 20px; text-align: center; font-variant-numeric: tabular-nums; }

    /* follower list modal */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.32);
      display: none;
      align-items: center; justify-content: center;
      z-index: 50;
    }
    .modal-backdrop.open { display: flex; }
    .modal-card {
      background: var(--bg);
      border-radius: 12px;
      width: min(380px, 92vw);
      max-height: 70vh;
      display: flex; flex-direction: column;
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
      border: 0.5px solid var(--border);
    }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 0.5px solid var(--border);
      font-family: 'Noto Serif SC', serif;
      font-size: 15px;
      font-weight: 600;
    }
    .modal-close {
      background: none; border: 0; cursor: pointer;
      color: var(--text3); font-size: 18px; line-height: 1;
      padding: 4px 8px;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { overflow-y: auto; padding: 8px 0; }
    .follower-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 18px;
      font-size: 13px;
    }
    .follower-row:hover { background: var(--bg2); }
    .follower-av {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--teal-50);
      color: var(--teal-600);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600;
    }
    .follower-name { flex: 1; color: var(--text); }
    .follower-empty { padding: 24px 18px; color: var(--text3); text-align: center; font-size: 13px; }

    footer {
      padding: 1.5rem 2rem;
      border-top: 0.5px solid var(--border);
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      letter-spacing: 0.3px;
    }

    @media (max-width: 640px) {
      body { border: none; }
      main { padding: 2.5rem 1.25rem 3rem; }
      .tagline { font-size: 19px; }
      .expert-grid { grid-template-columns: 1fr; }
      .expert-card { padding: 1.75rem 1.5rem; min-height: 160px; }
      .expert-name { font-size: 22px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="logo">Chat<span>2GO</span></a>
    <div class="nav-right" id="navRight" style="visibility:hidden;">
      <button class="btn-login" onclick="location.href='/login.html'">登录</button>
    </div>
  </nav>

  <main>
    <div class="tagline">真人大咖 × AI，<em>这就带你飞</em></div>

    <div class="expert-grid">
      <div class="expert-card" data-expert-id="fbb9ab4b-dc51-40f8-800e-e824ff6fb8c0">
        <div class="expert-tag">fortune teller</div>
        <div class="expert-name">森山大道 san</div>
        <div class="follow-pill" data-pill>
          <button type="button" class="pf-heart" title="关注大咖" onclick="followExpert(this)">&#9829;</button>
          <span class="pf-divider"></span>
          <button type="button" class="pf-count" title="查看 followers" onclick="openFollowers(this)">·</button>
        </div>
      </div>

      <div class="expert-card disabled">
        <div class="expert-tag">real estate</div>
        <div class="expert-name">Tony 哥</div>
      </div>

      <div class="expert-card disabled">
        <div class="expert-tag">cantonese bbq</div>
        <div class="expert-name">戴维斯</div>
      </div>

      <div class="expert-card disabled">
        <div class="expert-tag">rehab</div>
        <div class="expert-name">大白老师</div>
      </div>
    </div>
  </main>

  <footer>
    © 2026 Chat2GO
  </footer>

  <div class="modal-backdrop" id="followersModal" onclick="if(event.target===this)closeFollowers()">
    <div class="modal-card">
      <div class="modal-head">
        <span>Followers</span>
        <button class="modal-close" onclick="closeFollowers()">×</button>
      </div>
      <div class="modal-body" id="followersBody"></div>
    </div>
  </div>

  <script src="/vendor/supabase.js"
          onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'"></script>
  <script>
    const SUPABASE_URL = 'https://qjnagbzqhoansixqharb.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqbmFnYnpxaG9hbnNpeHFoYXJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNDIxODIsImV4cCI6MjA5MzkxODE4Mn0.GpMUVTk6JvqeciXagXQiJunc8TLFMHg3_b9reIjJ2Y8'
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    async function renderNav() {
      const right = document.getElementById('navRight')
      const { data: { session } } = await sb.auth.getSession()
      if (session) {
        const email = (session.user.email || '').replace(/"/g, '&quot;')
        const initial = (session.user.email || '?').charAt(0).toUpperCase()
        right.innerHTML =
          `<a class="nav-user" href="/chat.html" title="${email}">`
          + `<span class="user-av">${initial}</span>`
          + `<span>进入 Chat</span>`
          + `</a>`
          + `<button class="btn-logout" onclick="handleLogout()">退出</button>`
      }
      right.style.visibility = 'visible'
    }

    function expertIdFromEl(el) {
      return el.closest('.expert-card')?.dataset.expertId
    }

    async function followExpert(btnEl) {
      const expertId = expertIdFromEl(btnEl)
      if (!expertId) return
      btnEl.disabled = true
      const original = btnEl.innerHTML
      btnEl.textContent = '...'
      const { data: { session } } = await sb.auth.getSession()
      if (!session) { location.href = '/login.html'; return }
      const { data: room, error: e1 } = await sb
        .from('rooms').select('id').eq('expert_id', expertId).limit(1).maybeSingle()
      if (e1 || !room) { alert('找不到大咖的 Chat'); btnEl.disabled = false; btnEl.innerHTML = original; return }
      const { error: e2 } = await sb.from('room_members').insert({
        room_id: room.id, user_id: session.user.id,
      })
      if (e2 && e2.code !== '23505') { alert('加入失败：' + e2.message); btnEl.disabled = false; btnEl.innerHTML = original; return }
      location.href = `/chat.html?room=${room.id}`
    }

    async function loadFollowerCounts() {
      const cards = document.querySelectorAll('.expert-card[data-expert-id]')
      await Promise.all([...cards].map(async card => {
        const expertId = card.dataset.expertId
        const countEl = card.querySelector('.pf-count')
        if (!countEl) return
        const { data, error } = await sb.rpc('get_expert_follower_count', { p_expert_id: expertId })
        countEl.textContent = error ? '·' : (data ?? 0)
      }))
    }

    async function openFollowers(btnEl) {
      const expertId = expertIdFromEl(btnEl)
      if (!expertId) return
      const modal = document.getElementById('followersModal')
      const body = document.getElementById('followersBody')
      body.innerHTML = '<div class="follower-empty">加载中…</div>'
      modal.classList.add('open')
      const { data: { session } } = await sb.auth.getSession()
      if (!session) {
        body.innerHTML = '<div class="follower-empty">登录后可查看 follower 列表<br><br><a href="/login.html" style="color:var(--teal)">去登录</a></div>'
        return
      }
      const { data, error } = await sb.rpc('get_expert_followers', { p_expert_id: expertId })
      if (error) { body.innerHTML = `<div class="follower-empty">加载失败：${error.message}</div>`; return }
      if (!data || !data.length) { body.innerHTML = '<div class="follower-empty">还没有 follower</div>'; return }
      body.innerHTML = data.map(f => {
        const name = (f.display_name || '小白').replace(/</g, '&lt;')
        const initial = (f.display_name || '?').charAt(0).toUpperCase()
        return `<div class="follower-row"><span class="follower-av">${initial}</span><span class="follower-name">${name}</span></div>`
      }).join('')
    }

    function closeFollowers() {
      document.getElementById('followersModal').classList.remove('open')
    }

    async function handleLogout() {
      await sb.auth.signOut()
      location.reload()
    }

    renderNav()
    loadFollowerCounts()
  </script>
</body>
</html>
