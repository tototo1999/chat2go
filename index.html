<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Chat2GO</title>
  <meta name="description" content="选一位行业大咖，让 AI 帮你把需求说清楚。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:    #1D9E75;
      --teal-50: #E1F5EE;
      --teal-600:#0F6E56;
      --bg:      #FAFAF8;
      --bg2:     #DDDCD6;
      --border:  rgba(60,58,54,0.12);
      --border2: rgba(60,58,54,0.22);
      --text:    #1a1a18;
      --text2:   #5f5e5a;
      --text3:   #888780;
    }

    html { background: var(--bg2); }
    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      max-width: 800px;
      margin: 0 auto;
      border-left: 0.5px solid var(--border);
      border-right: 0.5px solid var(--border);
      min-height: 100vh;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 2rem;
      border-bottom: 0.5px solid var(--border);
    }
    .logo {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.3px;
    }
    .logo span { color: var(--teal); }
    .btn-login, .btn-logout {
      padding: 6px 14px;
      font-size: 12px;
      font-family: inherit;
      border: 0.5px solid var(--border2);
      border-radius: 8px;
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      transition: all .15s;
    }
    .btn-login:hover, .btn-logout:hover { background: var(--bg2); color: var(--text); }
    .nav-right { display: flex; align-items: center; gap: 8px; }
    .nav-user {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px 3px 3px;
      border-radius: 999px;
      background: #fff;
      border: 0.5px solid var(--border);
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      text-decoration: none;
      color: var(--text);
      font-size: 12px;
      transition: background .15s, transform .12s;
    }
    .nav-user:hover { transform: translateY(-1px); background: var(--teal-50); }
    .user-av {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--teal);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
    }

    /* 主区：上方一行 tagline，下面四张卡 */
    main {
      padding: 1.75rem 2rem 4rem;
    }
    .tagline {
      font-family: 'Noto Serif SC', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.3px;
      margin-bottom: 1.5rem;
    }
    .tagline em { color: var(--teal); font-style: normal; font-weight: 600; }

    .expert-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 0.5px solid var(--border);
    }
    .expert-card {
      background: var(--bg);
      padding: 2rem 1.75rem;
      cursor: pointer;
      transition: background .2s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      min-height: 200px;
    }
    .expert-card:hover {
      background: var(--bg2);
    }
    .expert-card:hover .expert-arrow { transform: translateX(4px); color: var(--teal); }
    .expert-card.disabled {
      cursor: default;
      color: var(--text3);
    }
    .expert-card.disabled:hover { background: var(--bg); }
    .expert-card.disabled .expert-arrow { display: none; }
    .expert-card.disabled .expert-tag { opacity: 0.55; }
    .expert-card.disabled .expert-name { opacity: 0.55; }
    .expert-tag {
      font-size: 11px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--text3);
      font-weight: 500;
      margin-bottom: 1.25rem;
    }
    .expert-name {
      font-family: 'Noto Serif SC', serif;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 0.4rem;
    }
    .expert-desc {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.65;
      flex: 1;
    }
    .expert-arrow {
      align-self: flex-end;
      font-size: 18px;
      color: var(--text3);
      transition: transform .2s, color .2s;
      margin-top: 1rem;
    }

    footer {
      padding: 1.5rem 2rem;
      border-top: 0.5px solid var(--border);
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      letter-spacing: 0.3px;
    }

    @media (max-width: 640px) {
      body { border: none; }
      main { padding: 2.5rem 1.25rem 3rem; }
      .tagline { font-size: 19px; }
      .expert-grid { grid-template-columns: 1fr; }
      .expert-card { padding: 1.75rem 1.5rem; min-height: 160px; }
      .expert-name { font-size: 22px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="logo">Chat<span>2GO</span></a>
    <div class="nav-right" id="navRight" style="visibility:hidden;">
      <button class="btn-login" onclick="location.href='/login.html'">登录</button>
    </div>
  </nav>

  <main>
    <div class="tagline">真人大咖 × AI，<em>这就带你飞</em></div>

    <div class="expert-grid">
      <a class="expert-card" href="/login.html?expert=moriyama">
        <div class="expert-tag">fortune teller</div>
        <div class="expert-name">森山大道 san</div>
        <div class="expert-arrow">→</div>
      </a>

      <div class="expert-card disabled">
        <div class="expert-tag">real estate</div>
        <div class="expert-name">Tony 哥</div>
      </div>

      <div class="expert-card disabled">
        <div class="expert-tag">cantonese bbq</div>
        <div class="expert-name">戴维斯</div>
      </div>

      <div class="expert-card disabled">
        <div class="expert-tag">rehab</div>
        <div class="expert-name">大白老师</div>
      </div>
    </div>
  </main>

  <footer>
    © 2026 Chat2GO
  </footer>

  <script src="/vendor/supabase.js"
          onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'"></script>
  <script>
    const SUPABASE_URL = 'https://qjnagbzqhoansixqharb.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqbmFnYnpxaG9hbnNpeHFoYXJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNDIxODIsImV4cCI6MjA5MzkxODE4Mn0.GpMUVTk6JvqeciXagXQiJunc8TLFMHg3_b9reIjJ2Y8'
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    async function renderNav() {
      const right = document.getElementById('navRight')
      const { data: { session } } = await sb.auth.getSession()
      if (session) {
        const email = (session.user.email || '').replace(/"/g, '&quot;')
        const initial = (session.user.email || '?').charAt(0).toUpperCase()
        right.innerHTML =
          `<a class="nav-user" href="/chat.html" title="${email}">`
          + `<span class="user-av">${initial}</span>`
          + `<span>进入 Chat</span>`
          + `</a>`
          + `<button class="btn-logout" onclick="handleLogout()">退出</button>`
      }
      right.style.visibility = 'visible'
    }

    async function handleLogout() {
      await sb.auth.signOut()
      location.reload()
    }

    renderNav()
  </script>
</body>
</html>
